story:
  chapterLabel: "Our Story"
  heading: "Vale & Juanpa"
  body: |
    What started as a friendship grew into something much greater.
    Together we have built dreams, lived adventures, and grown as a couple.
    Today we celebrate our love surrounded by the people we cherish most.
  imageAsset: "wedshots/photo_2026-03-07_17-44-09.jpg"
  imageAlt: "Our story together"
  highlights:
    - "From friends to life partners"
    - "Adventures together"
    - "Ready for the next chapter"

schedule:
  eyebrow: "Our Celebration"
  title: "Day Schedule"
  description: >
    Join us for every moment of this very special day.
  events:
    - number: "01"
      label: "Welcome"
      title: "Guest Arrival"
      description: >
        We welcome you to Hacienda El Salitre to kick off this celebration. Parking is available on site.
      details:
        - "Arrival from 3:30 PM"
        - text: "Dress code: Cocktail Semi-formal"
          sections:
            - title: "Women"
              items:
                - "Short, knee-length, or midi dresses"
                - "Dress pants, jumpsuits, or coordinated sets"
                - "The Little Black Dress is always a great choice"
                - "Heels and bold accessories"
                - "Avoid long gowns"
            - title: "Men"
              items:
                - "Straight cuts and monochromatic tones"
                - "Shirt always required"
                - "Blazer recommended; without blazer, long-sleeve tucked-in shirt"
                - "Tie optional"
                - "No jeans allowed"
        - "Adults-only event"
    - number: "02"
      label: "Ceremony"
      title: "Civil Ceremony"
      description: >
        The moment we have been waiting for. The ceremony will begin promptly.
      details:
        - "Prompt start at 4:00 PM"
        - "Hacienda El Salitre, Santiago de Querétaro"
    - number: "03"
      label: "Celebration"
      title: "Reception & Party"
      description: >
        Let's toast together, enjoy dinner, and dance the night away.
      details:
        - "Dinner and toast"
        - "Music and dancing"
        - "Open bar"

