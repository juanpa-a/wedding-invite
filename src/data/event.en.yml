favorites:
  title: "Our Favorites in Querétaro"
  description: >
    Querétaro is an incredible city and we want you to enjoy it.
    Here are some of our favorite spots to share with you.
  categories:
    - id: restaurantes
      label: "Restaurants"
      places:
        - name: "Tikua"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/tikua_sureste/"
          description: "Southeast Mexican cuisine in a colonial house from 1830. Yucatán, Oaxaca, and Chiapas on every plate, with traditional ingredients and artisan techniques."
        - name: "Acento Soul Kitchen"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/acento.soulkitchen/"
          description: "Asian cuisine fused with Mexican techniques in an intimate space with an open kitchen. They treat you like family and every visit feels special."
    - id: cafes
      label: "Cafés"
      places:
        - name: "Unidad"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/unidad.cafe/"
          description: "Specialty Mexican coffee with a HiFi music experience. A peaceful oasis for lovers of great coffee and great music."
        - name: "Tuyo"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/tuyo.cafe/"
          description: "Specialty coffee shop in the Historic Center, recognized among the top 100 in Mexico. Single-origin beans from Ethiopia, Colombia, and more."
    - id: bares
      label: "Bars"
      places:
        - name: "La Caja Popular"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/lacajapopular/"
          description: "The first bar 100% dedicated to Stand-Up Comedy in Latin America. Premium comedy shows and open mic nights for an unforgettable evening."
        - name: "Cerveceria Hercules"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/cchercules/"
          description: "Craft brewery in a historic 19th-century building with over 50 beer styles per year. A community space with restaurants and artisan shops."
    - id: lugares
      label: "Places"
      places:
        - name: "Panaderia Saint Honore"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/sainthonorepanaderia/"
          description: "Recognized as one of the best bakeries in Querétaro. Butter croissants, artisan tarts, and slow-fermented bread with French technique."
        - name: "Manpuku Ramen"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/manpuku_ramen/"
          description: "Authentic Japanese ramen in the historic center of Querétaro. Comforting soups, yakimeshi, and steamed buns made with skill and passion."
        - name: "Masa Critica Pan y Cafe"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/masacriticapanycafe/"
          description: "Artisan bread with a French soul and Mexican heart: croissants, conchas, and guacamayas that fly out on weekends. Quality coffee makes every visit something special."

lodging:
  title: "Lodging"
  description: >
    If you're traveling from out of town or just want a cozy place to rest after the party,
    here are some lodging options near the venue.
  places:
    - name: "Hacienda El Salitre"
      badge: "At the venue"
      description: "The most convenient option — stay right where the party is, no need to worry about transportation."
      address: "Rafael Osuna SN, Raquet Club, 76127 Santiago de Querétaro, Qro."
      website: "https://www.elsalitre.mx/el-hotel"
      phone: "+52 442 675 0505"
      priceRange: "$2,000 – $3,000 MXN / night"
      note: "Mention you're attending our wedding to get a special rate."
      highlight: true
    - name: "Holiday Inn Querétaro"
      badge: "6 min from venue"
      description: "A reliable and comfortable option very close to the venue."
      address: "Km. 11 Carretera Querétaro–San Luis Potosí, 76100 Santiago de Querétaro, Qro."
      website: "https://www.ihg.com/holidayinn/hotels/us/en/queretaro/mqebc/hoteldetail"
      phone: "+52 442 238 9900"
      priceRange: "$1,800 – $2,000 MXN / night"
      highlight: false
    - name: "Extended Suites Juriquilla"
      badge: "7 min from venue"
      description: "Great if you're looking for a more affordable option with all the comforts."
      address: "Av. Palma Canaria 831, Fracc. Valle Comercial, 76230 Santiago de Querétaro, Qro."
      website: "https://www.extendedsuites.com.mx/hotel-extended-suites-queretaro-juriquilla/"
      phone: "+52 442 642 3520"
      priceRange: "$800 – $1,200 MXN / night"
      highlight: false

