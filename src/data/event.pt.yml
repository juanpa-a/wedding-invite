favorites:
  title: "Nossos Favoritos em Querétaro"
  description: >
    Querétaro é uma cidade incrível e queremos que vocês a aproveitem.
    Aqui compartilhamos alguns dos nossos lugares favoritos.
  categories:
    - id: restaurantes
      label: "Restaurantes"
      places:
        - name: "Tikua"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/tikua_sureste/"
          description: "Culinária do sudeste mexicano em uma casa colonial de 1830. Yucatán, Oaxaca e Chiapas em cada prato, com ingredientes tradicionais e técnicas artesanais."
        - name: "Acento Soul Kitchen"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/acento.soulkitchen/"
          description: "Fusão de culinária asiática com técnicas mexicanas em um ambiente íntimo com cozinha aberta. Tratam você como família e cada visita é especial."
    - id: cafes
      label: "Cafés"
      places:
        - name: "Unidad"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/unidad.cafe/"
          description: "Café especial mexicano com experiência de música HiFi. Um oásis tranquilo para os amantes de bom café e boa música."
        - name: "Tuyo"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/tuyo.cafe/"
          description: "Cafeteria especial no Centro Histórico, reconhecida entre as 100 melhores do México. Grãos de origem da Etiópia, Colômbia e mais."
    - id: bares
      label: "Bares"
      places:
        - name: "La Caja Popular"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/lacajapopular/"
          description: "O primeiro bar 100% dedicado ao Stand Up Comedy na América Latina. Shows de comédia premium e noites de microfone aberto para uma noite inesquecível."
        - name: "Cerveceria Hercules"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/cchercules/"
          description: "Cervejaria artesanal em um edifício histórico do século XIX com mais de 50 estilos de cerveja por ano. Um espaço comunitário com restaurantes e lojas artesanais."
    - id: lugares
      label: "Lugares"
      places:
        - name: "Panaderia Saint Honore"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/sainthonorepanaderia/"
          description: "Reconhecida como uma das melhores padarias de Querétaro. Croissants de manteiga, tortas artesanais e pão de fermentação lenta com técnica francesa."
        - name: "Manpuku Ramen"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/manpuku_ramen/"
          description: "Ramen japonês autêntico no centro histórico de Querétaro. Sopas reconfortantes, yakimeshi e pãezinhos no vapor feitos com técnica e paixão."
        - name: "Masa Critica Pan y Cafe"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/masacriticapanycafe/"
          description: "Pão artesanal com alma francesa e coração mexicano: croissants, conchas e guacamayas que somem nos fins de semana. O café de qualidade torna cada visita algo especial."

lodging:
  title: "Hospedagem"
  description: >
    Se vocês vêm de fora ou simplesmente querem descansar tranquilos depois da festa,
    aqui deixamos algumas opções de hospedagem perto da fazenda.
  places:
    - name: "Hacienda El Salitre"
      badge: "No venue"
      description: "A opção mais cômoda — fiquem onde é a festa, sem se preocupar com transporte."
      address: "Rafael Osuna SN, Raquet Club, 76127 Santiago de Querétaro, Qro."
      website: "https://www.elsalitre.mx/el-hotel"
      phone: "+52 442 675 0505"
      priceRange: "$2,000 – $3,000 MXN / noite"
      note: "Mencionem que vão ao nosso casamento para obter uma tarifa especial."
      highlight: true
    - name: "Holiday Inn Querétaro"
      badge: "A 6 min do venue"
      description: "Uma opção confiável e confortável muito perto do local."
      address: "Km. 11 Carretera Querétaro–San Luis Potosí, 76100 Santiago de Querétaro, Qro."
      website: "https://www.ihg.com/holidayinn/hotels/us/en/queretaro/mqebc/hoteldetail"
      phone: "+52 442 238 9900"
      priceRange: "$1,800 – $2,000 MXN / noite"
      highlight: false
    - name: "Extended Suites Juriquilla"
      badge: "A 7 min do venue"
      description: "Ideal se procuram uma opção mais acessível com todas as comodidades."
      address: "Av. Palma Canaria 831, Fracc. Valle Comercial, 76230 Santiago de Querétaro, Qro."
      website: "https://www.extendedsuites.com.mx/hotel-extended-suites-queretaro-juriquilla/"
      phone: "+52 442 642 3520"
      priceRange: "$800 – $1,200 MXN / noite"
      highlight: false

