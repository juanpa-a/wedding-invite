hero:
  tagline: "Nosso Casamento"
  title: "Vale & Juanpa"
  description: >
    Queremos compartilhar com vocês um dos dias mais importantes de nossas vidas.
    Esperamos por vocês para celebrar juntos esta nova etapa cheia de amor.
  weekday: "Sábado"
  dateDisplay: "25 · 07 · 2026"
  location: "Santiago de Querétaro • Hacienda El Salitre"

story:
  chapterLabel: "Nossa História"
  heading: "Vale & Juanpa"
  body: |
    O que começou como uma amizade se tornou algo muito maior.
    Juntos construímos sonhos, vivemos aventuras e crescemos como casal.
    Hoje celebramos nosso amor rodeados das pessoas que mais amamos.
  imageAsset: "wedshots/photo_2026-03-07_17-44-09.jpg"
  imageAlt: "Nossa história juntos"
  highlights:
    - "De amigos a companheiros de vida"
    - "Aventuras juntos"
    - "Prontos para o próximo capítulo"

schedule:
  eyebrow: "Nossa Celebração"
  title: "Programação do Dia"
  description: >
    Junte-se a nós em cada momento deste dia tão especial para nós.
  events:
    - number: "01"
      label: "Boas-vindas"
      title: "Chegada dos Convidados"
      description: >
        Recebemos vocês na Hacienda El Salitre para dar início a esta celebração. O local tem estacionamento disponível.
      details:
        - "Chegada a partir das 15h30"
        - "Dress code: Cocktail Semiformal"
        - "Evento exclusivo para adultos"
    - number: "02"
      label: "Cerimônia"
      title: "Cerimônia Civil"
      description: >
        O momento que tanto esperávamos. A cerimônia começará pontualmente.
      details:
        - "Início pontual às 16h00"
        - "Hacienda El Salitre, Santiago de Querétaro"
    - number: "03"
      label: "Celebração"
      title: "Recepção e Festa"
      description: >
        Vamos brindar juntos, aproveitar o jantar e dançar até não poder mais.
      details:
        - "Jantar e brinde"
        - "Música e dança"
        - "Bar aberto"

