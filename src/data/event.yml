favorites:
  title: "Nuestros Favoritos en Queretaro"
  description: >
    Queretaro es una ciudad increible y queremos que la disfruten.
    Aqui les compartimos algunos de nuestros lugares favoritos.
  categories:
    - id: restaurantes
      label: "Restaurantes"
      places:
        - name: "Tikua"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/tikua_sureste/"
          description: "Cocina del sureste mexicano en una casa colonial de 1830. Yucatán, Oaxaca y Chiapas en cada platillo, con ingredientes tradicionales y técnicas artesanales."
        - name: "Acento Soul Kitchen"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/acento.soulkitchen/"
          description: "Fusión de cocina asiática con técnicas mexicanas en un ambiente íntimo con cocina abierta. Te tratan como familia y cada visita se siente especial."
    - id: cafes
      label: "Cafes"
      places:
        - name: "Unidad"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/unidad.cafe/"
          description: "Café de especialidad mexicano con experiencia de música HiFi. Un oasis tranquilo para los amantes del buen café y la buena música."
        - name: "Tuyo"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/tuyo.cafe/"
          description: "Cafetería de especialidad en el Centro Histórico, reconocida entre las 100 mejores de México. Granos de origen de Etiopía, Colombia y más."
    - id: bares
      label: "Bares"
      places:
        - name: "La Caja Popular"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/lacajapopular/"
          description: "El primer bar dedicado 100% al Stand Up Comedy en Latinoamérica. Shows de comedia premium y noches de micrófono abierto para pasar una noche inolvidable."
        - name: "Cerveceria Hercules"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/cchercules/"
          description: "Cervecería artesanal en un edificio histórico del siglo XIX con más de 50 estilos de cerveza al año. Un espacio comunitario con restaurantes y tiendas artesanales."
    - id: lugares
      label: "Lugares"
      places:
        - name: "Panaderia Saint Honore"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/sainthonorepanaderia/"
          description: "Reconocida como una de las mejores panaderías de Querétaro. Croissants de mantequilla, tartas artesanales y pan de fermentación lenta con técnica francesa."
        - name: "Manpuku Ramen"
          favoriteDe: "vale"
          instagram: "https://www.instagram.com/manpuku_ramen/"
          description: "Ramen auténtico japonés en el centro histórico de Querétaro. Sopas reconfortantes, yakimeshi y panecillos al vapor hechos con técnica y pasión."
        - name: "Masa Critica Pan y Cafe"
          favoriteDe: "juanpa"
          instagram: "https://www.instagram.com/masacriticapanycafe/"
          description: "Pan artesanal con alma francesa y corazón mexicano: croissants, conchas y guacamayas que vuelan los fines de semana. El café de calidad hace de cada visita algo especial."

countdown:
