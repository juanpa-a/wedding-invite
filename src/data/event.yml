hero:
  tagline: "Nuestra Boda"
  title: "Vale & Juanpa"
  description: >
    Queremos compartir con ustedes uno de los días más importantes de nuestra vida.
    Los esperamos para celebrar juntos esta nueva etapa llena de amor.
  weekday: "Sábado"
  dateDisplay: "25 · 07 · 2026"
  location: "Santiago de Querétaro • Hacienda El Salitre"

story:
  chapterLabel: "Nuestra Historia"
  heading: "Vale & Juanpa"
  body: |
    Lo que empezó como una amistad se convirtió en algo mucho más grande.
    Juntos hemos construido sueños, vivido aventuras y crecido como pareja.
    Hoy celebramos nuestro amor rodeados de las personas que más queremos.
  imageAsset: "wedshots/photo_2026-03-07_17-44-09.jpg"
  imageAlt: "Nuestra historia juntos"
  highlights:
    - "De amigos a compañeros de vida"
    - "Aventuras juntos"
    - "Listos para el siguiente capítulo"

schedule:
  eyebrow: "Nuestra Celebración"
  title: "Programa del Día"
  description: >
    Acompáñenos en cada momento de este día tan especial para nosotros.
  events:
    - number: "01"
      label: "Bienvenida"
      title: "Llegada de Invitados"
      description: >
        Los recibimos en la Hacienda El Salitre para dar inicio a esta celebración. El lugar cuenta con estacionamiento.
      details:
        - "Llegada a partir de las 15:30 hrs"
        - "Código de vestimenta: Cocktail Semiformal"
        - "Evento exclusivo para adultos"
    - number: "02"
      label: "Ceremonia"
      title: "Ceremonia Civil"
      description: >
        El momento que tanto hemos esperado. La ceremonia dará inicio puntualmente.
      details:
        - "Inicio puntual a las 16:00 hrs"
        - "Hacienda El Salitre, Santiago de Querétaro"
    - number: "03"
      label: "Celebración"
      title: "Recepción y Fiesta"
      description: >
        Brindemos juntos, disfrutemos la cena y bailemos hasta que el cuerpo aguante.
      details:
        - "Cena y brindis"
        - "Música y baile"
        - "Barra de bebidas"

